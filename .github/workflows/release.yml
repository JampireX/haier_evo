name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version from manifest
        id: ver
        run: echo "version=$(jq -r '.version' custom_components/haier_evo/manifest.json)" >> "$GITHUB_OUTPUT"
      - name: Create release if it does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          PRERELEASE=""
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            PRERELEASE="--prerelease"
          fi
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — skipping."
          else
            gh release create "$VERSION" --title "$VERSION" --generate-notes --target "$GITHUB_SHA" $PRERELEASE
          fi
